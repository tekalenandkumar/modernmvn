spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5440}/${PGDATABASE:mvn_discovery}
spring.datasource.username=${PGUSER:dev_user}
spring.datasource.password=${PGPASSWORD:dev_password}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Prevent DDL or queries from hanging forever if a lock is held
spring.datasource.hikari.connection-init-sql=SET lock_timeout = '10s'

# Railway Connection Stability
# Allow circular references since we use @Lazy for async transactions
spring.main.allow-circular-references=true

# Resilience4j Circuit Breaker settings for OSV
resilience4j.circuitbreaker.instances.osv.slidingWindowSize=10
resilience4j.circuitbreaker.instances.osv.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.osv.failureRateThreshold=50
resilience4j.circuitbreaker.instances.osv.waitDurationInOpenState=60s

resilience4j.timelimiter.instances.osv.timeoutDuration=5s
# Railway Connection Stability
spring.datasource.test-on-borrow=true
spring.datasource.validation-query=SELECT 1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Redis Configuration
# Cloud providers often expose REDIS_URL
# Redis Configuration
# Cloud providers often expose REDIS_URL
# If REDIS_URL is present, Spring Boot will use it automatically.
# Otherwise, we fallback to host/port (which defaults to localhost:6379 if not set)
# spring.data.redis.host=${REDIS_HOST:localhost}
# spring.data.redis.port=${REDIS_PORT:6379}
# spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Server Configuration
server.port=${PORT:8080}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=512KB
spring.servlet.multipart.max-request-size=1MB

# Maven Configuration
maven.local-repo=${MAVEN_LOCAL_REPO:target/local-repo}
maven.remote-repo=${MAVEN_REMOTE_REPO:https://repo.maven.apache.org/maven2/}

# ─── Health / Actuator ───────────────────────────────────────────────────────
# Railway hits /health — mapped below.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
# Don't let a degraded Redis block /health returning 200
management.health.redis.enabled=false

# ─── Logging ─────────────────────────────────────────────────────────────────
# More verbose startup logging to diagnose Railway failures.
logging.level.com.modernmvn=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=INFO
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.data.redis=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Crawler ─────────────────────────────────────────────────────────────────
modernmvn.crawler.enabled=false

# ─── Worker Retry Configuration ──────────────────────────────────────────────
# Time to wait before considering a PROCESSING job as "stuck"
modernmvn.worker.stuck-timeout-minutes=30
# Maximum number of times to retry a stuck job before marking as FAILED
modernmvn.worker.max-retries=3
# Delay between cleanup runs (default 5 minutes)
modernmvn.worker.cleanup.delay=300000
# Delay between orphan sync runs (default 1 hour)
modernmvn.worker.sync-orphans.delay=3600000
# Threshold in minutes to consider a PROCESSING/PENDING version as orphaned
modernmvn.worker.sync-orphans.threshold-minutes=30
